# whenly.de vhost — mounted into the ev-monitor nginx container.
# Requires:
#   - Let's Encrypt cert for whenly.de (see docs/deployment/server-setup.md)
#   - whenly stack running with nginx bound to 127.0.0.1:8091

# HTTP — redirect to HTTPS + ACME challenge passthrough
server {
    listen 80;
    server_name whenly.de www.whenly.de;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://whenly.de$request_uri;
    }
}

# HTTPS — SSL termination + proxy to whenly nginx
server {
    listen 443 ssl http2;
    server_name whenly.de www.whenly.de;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/whenly.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whenly.de/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_WHENLY:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # www -> apex redirect
    if ($host = www.whenly.de) {
        return 301 https://whenly.de$request_uri;
    }

    location / {
        proxy_pass http://172.17.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
