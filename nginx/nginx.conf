user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 30;
  server_tokens off;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript application/json
             application/xml image/svg+xml application/manifest+json text/calendar;

  # Security headers (applied per-location too)
  map $sent_http_content_type $whenly_csp {
    default "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me; font-src 'self' https://fonts.gstatic.com https://rsms.me; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
  }

  upstream whenly_backend  { server backend:8080;  }
  upstream whenly_frontend { server frontend:80;   }

  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 1m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy $whenly_csp always;

    location /api/ {
      proxy_pass http://whenly_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /actuator/health {
      proxy_pass http://whenly_backend;
      access_log off;
    }

    location / {
      proxy_pass http://whenly_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
