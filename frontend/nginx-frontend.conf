server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Caching: hashed assets are immutable, HTML/SW must always re-check.
  location ~* \.(?:js|css|woff2?|png|svg|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
