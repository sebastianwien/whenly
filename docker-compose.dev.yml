# Local Development Setup - Only PostgreSQL
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: whenly
      POSTGRES_PASSWORD: whenly
      POSTGRES_DB: whenly
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whenly -d whenly"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
